# Uso (na pasta docker/):
#   docker compose up -d --build
#
# Aplicação: http://localhost:8080
# PostgreSQL host na máquina: localhost:5433
#
# O bind mount monta o código da raiz do projeto; rode na máquina host, se precisar:
#   composer install && npm ci && npm run build
# Ou remova o volume do serviço `app` para usar só o que foi copiado na imagem.

services:
  postgres:
    image: postgres:16-alpine
    container_name: bolso-planejado-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-divida_zero}
      POSTGRES_USER: ${DB_USERNAME:-divida_zero}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-divida_zero_secret}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-divida_zero} -d ${DB_DATABASE:-divida_zero}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 25s

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: bolso-planejado-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ..:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_KEY: ${APP_KEY:-}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-divida_zero}
      DB_USERNAME: ${DB_USERNAME:-divida_zero}
      DB_PASSWORD: ${DB_PASSWORD:-divida_zero_secret}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "9000"

  nginx:
    image: nginx:1.27-alpine
    container_name: bolso-planejado-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ..:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  postgres_data:
